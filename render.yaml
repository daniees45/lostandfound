services:
  - type: web
    name: lost-found-ai-backend
    runtime: python
    region: oregon
    plan: free
    rootDir: ai-backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.0"
      - key: ALLOWED_ORIGINS
        sync: false          # Set in Render dashboard to your Next.js production URL
