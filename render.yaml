services:
  - type: web
    name: lostfound-ai-backend
    runtime: python
    region: oregon
    plan: free
    rootDir: ai-backend
    buildCommand: pip install --upgrade pip && pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: PYTHON_VERSION
        value: "3.11"
      - key: ALLOWED_ORIGINS
        sync: false
